<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Loading Fresh Dashboard...</title>
    <style>
        body {
            background: #1f2937;
            color: #fbbf24;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .loader {
            text-align: center;
        }
        h1 {
            font-size: 2em;
            margin-bottom: 20px;
        }
        .spinner {
            border: 4px solid #374151;
            border-top: 4px solid #fbbf24;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    <script>
        // Force reload with cache busting
        setTimeout(function() {
            window.location.href = 'index.html?nocache=' + new Date().getTime();
        }, 1000);
    </script>
</head>
<body>
    <div class="loader">
        <h1>🔥 Loading Fresh Quantum Dashboard 🔥</h1>
        <div class="spinner"></div>
        <p>Bypassing browser cache...</p>
        <p>EN EEKE MAI EA ♾️♾️</p>
    </div>
</body>
</html>
